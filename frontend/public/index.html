<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPaint — Only Good News</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&family=Libre+Franklin:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #0D0D0B;
  --canvas: #F7F3EC;
  --parchment: #EDE8DC;
  --warm-mid: #C4B99A;
  --gold: #C9973A;
  --rust: #B5451B;
  --teal: #1B7A6E;
  --green: #2D7A3A;
  --muted: #7A7060;
  --serif: 'Playfair Display', Georgia, serif;
  --mono: 'DM Mono', monospace;
  --sans: 'Libre Franklin', sans-serif;
}

html { scroll-behavior: smooth; }
body { background: var(--canvas); color: var(--ink); font-family: var(--sans); font-weight: 300; min-height: 100vh; }

/* ── MASTHEAD ── */
.masthead {
  border-bottom: 3px double var(--warm-mid);
  padding: 1rem 2.5rem;
  display: flex; justify-content: space-between; align-items: center;
  background: var(--canvas);
  position: sticky; top: 0; z-index: 100;
}

.logo { font-family: var(--serif); font-size: 2rem; font-weight: 700; color: var(--ink); text-decoration: none; letter-spacing: -0.03em; }
.logo .i { color: var(--rust); font-style: italic; }
.logo .dot { color: var(--gold); }

.masthead-center { text-align: center; }
.masthead-date { font-family: var(--mono); font-size: 0.6rem; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; }
.masthead-motto { font-family: var(--serif); font-size: 0.75rem; font-style: italic; color: var(--warm-mid); margin-top: 0.1rem; }

.live-badge { display: flex; align-items: center; gap: 0.5rem; font-family: var(--mono); font-size: 0.6rem; color: var(--green); letter-spacing: 0.12em; text-transform: uppercase; }
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(1.5)} }

/* ── CATEGORY TABS ── */
.cat-bar {
  background: var(--parchment);
  border-bottom: 1px solid var(--warm-mid);
  padding: 0 2.5rem;
  display: flex; gap: 0; overflow-x: auto; scrollbar-width: none;
}
.cat-bar::-webkit-scrollbar { display: none; }

.cat-btn {
  font-family: var(--mono); font-size: 0.62rem; font-weight: 400;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted);
  background: none; border: none; border-bottom: 2px solid transparent;
  padding: 0.75rem 1.1rem; cursor: pointer; transition: all 0.18s;
  white-space: nowrap; display: flex; align-items: center; gap: 0.4rem;
}
.cat-btn:hover { color: var(--ink); }
.cat-btn.active { color: var(--ink); border-bottom-color: var(--rust); font-weight: 500; }
.cat-btn .cat-emoji { font-size: 0.75rem; }

/* ── SEARCH BAR ── */
.search-bar {
  padding: 0.9rem 2.5rem;
  border-bottom: 1px solid var(--parchment);
  display: flex; gap: 0.6rem; align-items: center;
  background: var(--canvas);
}
.search-input {
  flex: 1; font-family: var(--sans); font-size: 0.85rem; font-weight: 300;
  color: var(--ink); background: var(--parchment); border: 1px solid var(--warm-mid);
  border-radius: 2px; padding: 0.6rem 1rem; outline: none; transition: border-color 0.2s;
}
.search-input::placeholder { color: var(--warm-mid); }
.search-input:focus { border-color: var(--gold); }

.search-btn {
  font-family: var(--mono); font-size: 0.65rem; font-weight: 500;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--canvas); background: var(--teal); border: none;
  padding: 0.6rem 1.4rem; border-radius: 2px; cursor: pointer;
  transition: all 0.2s; display: flex; align-items: center; gap: 0.5rem;
}
.search-btn:hover { background: var(--ink); }
.search-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.spin { width: 12px; height: 12px; border: 1.5px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
.search-btn.loading .spin { display: block; }
.search-btn.loading .btn-txt { display: none; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── MAIN LAYOUT ── */
.paper { max-width: 1360px; margin: 0 auto; padding: 2rem 2.5rem; }

/* ── LOADING ── */
.loader {
  display: none; padding: 4rem 2rem; text-align: center;
}
.loader.show { display: block; }
.loader-text { font-family: var(--serif); font-size: 1.1rem; font-style: italic; color: var(--muted); margin-bottom: 0.4rem; }
.loader-sub { font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--warm-mid); }

/* progress bar */
.progress-bar { width: 200px; height: 2px; background: var(--parchment); margin: 1rem auto 0; border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; width: 0%; background: var(--teal); animation: progress 3s ease forwards; }
@keyframes progress { 0%{width:0%} 80%{width:85%} 100%{width:90%} }

/* ── FEED ── */
.feed { transition: opacity 0.3s; }
.feed.fading { opacity: 0; }

/* top article — full width editorial */
.top-article {
  display: grid; grid-template-columns: 1.5fr 1fr;
  gap: 2.5rem; border-bottom: 2px solid var(--ink);
  padding-bottom: 2rem; margin-bottom: 2rem;
}

.article-tag {
  font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--teal);
  display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.6rem;
}
.joy-pill {
  background: rgba(27,122,110,0.12); border: 1px solid rgba(27,122,110,0.25);
  color: var(--teal); padding: 0.1rem 0.5rem; border-radius: 20px;
  font-size: 0.56rem; letter-spacing: 0.1em;
}

.top-headline {
  font-family: var(--serif); font-size: clamp(1.6rem, 2.8vw, 2.6rem);
  font-weight: 700; line-height: 1.12; letter-spacing: -0.025em;
  margin-bottom: 0.8rem; cursor: pointer; transition: color 0.2s;
}
.top-headline:hover { color: var(--teal); }

.top-deck { font-size: 0.95rem; font-weight: 300; line-height: 1.8; color: var(--muted); margin-bottom: 1rem; }

.article-meta { font-family: var(--mono); font-size: 0.6rem; color: var(--warm-mid); letter-spacing: 0.08em; display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
.joy-badge { background: var(--gold); color: var(--ink); font-weight: 500; padding: 0.15rem 0.5rem; border-radius: 2px; font-size: 0.6rem; }
.src-link { color: var(--teal); text-decoration: none; border-bottom: 1px solid rgba(27,122,110,0.3); }
.src-link:hover { border-bottom-color: var(--teal); }

/* right-side stacked mini stories */
.aside-stack { display: flex; flex-direction: column; gap: 0; }
.aside-item {
  border-bottom: 1px solid var(--parchment); padding: 0.9rem 0;
  cursor: pointer; transition: background 0.15s; padding: 0.9rem 0.8rem;
  border-radius: 2px;
}
.aside-item:hover { background: var(--parchment); }
.aside-item:last-child { border-bottom: none; }
.aside-tag { font-family: var(--mono); font-size: 0.56rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.3rem; }
.aside-headline { font-family: var(--serif); font-size: 0.92rem; font-weight: 700; line-height: 1.25; margin-bottom: 0.3rem; }
.aside-deck { font-size: 0.72rem; color: var(--muted); font-weight: 300; line-height: 1.55; }

/* section divider */
.section-rule {
  display: flex; align-items: center; gap: 1rem;
  margin: 2rem 0 1.5rem; color: var(--muted);
}
.section-rule::before, .section-rule::after { content: ''; flex: 1; height: 1px; background: var(--warm-mid); }
.section-rule-label { font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; white-space: nowrap; }

/* bottom 4 cards grid */
.cards-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 1px; background: var(--warm-mid);
  border: 1px solid var(--warm-mid); border-radius: 2px; overflow: hidden;
  margin-bottom: 3rem;
}

.news-card {
  background: var(--canvas); padding: 1.4rem 1.2rem;
  cursor: pointer; transition: background 0.2s; position: relative;
}
.news-card:hover { background: var(--parchment); }

.card-tag { font-family: var(--mono); font-size: 0.56rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.5rem; }
.card-headline { font-family: var(--serif); font-size: 1.0rem; font-weight: 700; line-height: 1.25; margin-bottom: 0.55rem; letter-spacing: -0.01em; }
.card-deck { font-size: 0.75rem; font-weight: 300; color: var(--muted); line-height: 1.65; margin-bottom: 0.8rem; }

.card-footer { display: flex; justify-content: space-between; align-items: center; }
.card-time { font-family: var(--mono); font-size: 0.56rem; color: var(--warm-mid); }
.joy-bar-wrap { display: flex; align-items: center; gap: 0.35rem; }
.joy-bar { width: 44px; height: 3px; background: var(--parchment); border-radius: 2px; overflow: hidden; }
.joy-fill { height: 100%; background: var(--teal); border-radius: 2px; transition: width 1.2s ease; width: 0%; }
.joy-bar-num { font-family: var(--mono); font-size: 0.52rem; color: var(--warm-mid); }

/* ── MODAL ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(13,13,11,0.72); z-index: 500;
  align-items: center; justify-content: center; padding: 1.5rem;
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--canvas); border: 1px solid var(--warm-mid);
  border-radius: 4px; max-width: 660px; width: 100%;
  max-height: 88vh; overflow-y: auto; padding: 2.5rem;
  position: relative; animation: slideUp 0.25s ease;
}
@keyframes slideUp { from{transform:translateY(16px);opacity:0} to{transform:translateY(0);opacity:1} }

.modal-close {
  position: absolute; top: 1rem; right: 1rem;
  background: none; border: 1px solid var(--warm-mid); border-radius: 2px;
  font-family: var(--mono); font-size: 0.62rem; color: var(--muted);
  padding: 0.3rem 0.7rem; cursor: pointer; transition: all 0.15s;
}
.modal-close:hover { background: var(--parchment); color: var(--ink); }

.modal-tag { font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--teal); margin-bottom: 0.7rem; }
.modal-headline { font-family: var(--serif); font-size: 1.7rem; font-weight: 700; line-height: 1.18; margin-bottom: 0.7rem; letter-spacing: -0.02em; }
.modal-meta { font-family: var(--mono); font-size: 0.6rem; color: var(--warm-mid); margin-bottom: 1.4rem; display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; }
.modal-body { font-size: 0.9rem; font-weight: 300; line-height: 1.9; color: var(--muted); }
.modal-body p { margin-bottom: 1rem; }

.modal-divider { height: 1px; background: var(--parchment); margin: 1.2rem 0; }
.modal-source-note { font-family: var(--mono); font-size: 0.6rem; color: var(--warm-mid); letter-spacing: 0.08em; }

/* ── BOTTOM BAR ── */
.bottom-bar {
  border-top: 3px double var(--warm-mid);
  padding: 0.8rem 2.5rem;
  display: flex; justify-content: space-between; align-items: center;
  background: var(--parchment);
}
.bottom-copy { font-family: var(--mono); font-size: 0.58rem; color: var(--warm-mid); letter-spacing: 0.08em; }
.refresh-btn {
  font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--teal); background: none; border: 1px solid rgba(27,122,110,0.3);
  padding: 0.4rem 1rem; border-radius: 2px; cursor: pointer; transition: all 0.2s;
}
.refresh-btn:hover { background: var(--teal); color: var(--canvas); }
</style>
</head>
<body>

<!-- MASTHEAD -->
<header class="masthead">
  <a href="#" class="logo"><span class="i">i</span>Paint</a>
  <div class="masthead-center">
    <div class="masthead-date" id="today-date"></div>
    <div class="masthead-motto">"Only the bright side of the world"</div>
  </div>
  <div class="live-badge"><div class="live-dot"></div>Live Good News</div>
</header>

<!-- CATEGORY TABS -->
<div class="cat-bar" id="catBar">
  <button class="cat-btn active" data-cat="India" data-q="positive good news India achievement today 2026"><span class="cat-emoji">🇮🇳</span>India</button>
  <button class="cat-btn" data-cat="World" data-q="positive uplifting world news breakthrough today 2026"><span class="cat-emoji">🌍</span>World</button>
  <button class="cat-btn" data-cat="Science" data-q="science discovery breakthrough good news 2026"><span class="cat-emoji">🔬</span>Science</button>
  <button class="cat-btn" data-cat="Health" data-q="medical health breakthrough cure positive news 2026"><span class="cat-emoji">💊</span>Health</button>
  <button class="cat-btn" data-cat="Environment" data-q="environment climate solution conservation win good news 2026"><span class="cat-emoji">🌿</span>Environment</button>
  <button class="cat-btn" data-cat="Technology" data-q="technology innovation positive impact news 2026"><span class="cat-emoji">⚡</span>Technology</button>
  <button class="cat-btn" data-cat="Business" data-q="business success economic growth positive India news 2026"><span class="cat-emoji">📈</span>Business</button>
  <button class="cat-btn" data-cat="Sports" data-q="sports win achievement inspiring athlete news 2026"><span class="cat-emoji">🏆</span>Sports</button>
  <button class="cat-btn" data-cat="Arts" data-q="arts culture achievement music film award India 2026"><span class="cat-emoji">🎨</span>Arts</button>
  <button class="cat-btn" data-cat="Community" data-q="community kindness hero grassroots positive story 2026"><span class="cat-emoji">🤝</span>Community</button>
</div>

<!-- SEARCH BAR -->
<div class="search-bar">
  <input type="text" class="search-input" id="searchInput" placeholder="Search for good news on any topic… e.g. 'clean energy India' or 'cancer cure 2026'" />
  <button class="search-btn" id="searchBtn" onclick="loadNews()">
    <div class="spin"></div>
    <span class="btn-txt">✦ Find Bright News</span>
  </button>
</div>

<!-- PAPER -->
<main class="paper">
  <div class="loader" id="loader">
    <div class="loader-text" id="loaderText">Searching the world for bright stories…</div>
    <div class="loader-sub" id="loaderSub">Filtering out the noise · painting only the light</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <div class="feed" id="feed">
    <div class="top-article" id="topArticle"></div>
    <div class="section-rule"><span class="section-rule-label">More bright stories</span></div>
    <div class="cards-grid" id="cardsGrid"></div>
  </div>
</main>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <span class="bottom-copy">iPaint · Good News Edition · AI-curated positivity · No doom-scrolling</span>
  <button class="refresh-btn" onclick="loadNews()">↻ Repaint</button>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="maybeCloseModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">✕ Close</button>
    <div class="modal-tag" id="mTag"></div>
    <h2 class="modal-headline" id="mHeadline"></h2>
    <div class="modal-meta" id="mMeta"></div>
    <div class="modal-body" id="mBody"></div>
    <div class="modal-divider"></div>
    <div class="modal-source-note" id="mSource"></div>
  </div>
</div>

<script>
// ── CONFIG ─────────────────────────────────────────────────────────
// In production, set this to your deployed backend URL
// e.g. https://ipaint-api.railway.app
const API_BASE = window.IPAINT_API_URL || 'http://localhost:3001';

// ── STATE ──────────────────────────────────────────────────────────
let currentCat = 'India';
let currentQ   = 'positive good news India achievement today 2026';
let articles   = [];
let isLoading  = false;

// Date
const d = new Date();
document.getElementById('today-date').textContent = d.toLocaleDateString('en-IN',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

// ── TABS ──────────────────────────────────────────────────────────
document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (isLoading) return;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    currentQ   = btn.dataset.q;
    document.getElementById('searchInput').value = '';
    loadNews();
  });
});

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') loadNews();
});

// ── MAIN LOAD ─────────────────────────────────────────────────────
async function loadNews() {
  if (isLoading) return;
  isLoading = true;

  const customSearch = document.getElementById('searchInput').value.trim();
  const displayCat   = customSearch ? 'Custom Search' : currentCat;

  const loader = document.getElementById('loader');
  const feed   = document.getElementById('feed');
  const btn    = document.getElementById('searchBtn');

  loader.classList.add('show');
  feed.classList.add('fading');
  btn.classList.add('loading');
  btn.disabled = true;

  // Reset progress bar
  const pf = document.getElementById('progressFill');
  pf.style.animation = 'none';
  pf.offsetHeight;
  pf.style.animation = '';

  updateLoaderText(displayCat);

  try {
    let res;
    if (customSearch) {
      res = await fetch(`${API_BASE}/api/news/search`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: customSearch })
      });
    } else {
      res = await fetch(`${API_BASE}/api/news/${encodeURIComponent(currentCat)}`);
    }

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${res.status}`);
    }

    const parsed = await res.json();
    articles = parsed.stories || [];
    renderFeed(parsed);

  } catch (err) {
    console.error('loadNews error:', err);
    document.getElementById('feed').innerHTML = `
      <div style="text-align:center;padding:4rem 2rem;">
        <div style="font-family:var(--serif);font-size:1.3rem;font-style:italic;color:var(--muted);margin-bottom:0.5rem">Could not load news</div>
        <div style="font-family:var(--mono);font-size:0.65rem;color:var(--warm-mid);letter-spacing:0.1em">${err.message} · Check the backend is running</div>
      </div>`;
  }

  loader.classList.remove('show');
  feed.classList.remove('fading');
  btn.classList.remove('loading');
  btn.disabled = false;
  isLoading = false;
}

function updateLoaderText(cat) {
  const messages = {
    'India':         ['Scanning India for bright moments…',       'Finding stories of hope and progress'],
    'World':         ['Searching the globe for good news…',        'The world is better than you think'],
    'Science':       ['Checking the labs for breakthroughs…',      'Science is solving so much, quietly'],
    'Health':        ['Sifting through medical wins…',             'More cures, more hope, every day'],
    'Environment':   ['Finding the green shoots of hope…',         'Nature is fighting back — and winning'],
    'Technology':    ['Scanning tech for human-positive wins…',    'Innovation that helps, not harms'],
    'Business':      ['Finding economic bright spots…',            'Growth, jobs, purpose — it's happening'],
    'Sports':        ['Catching the inspiring moments…',           'Champions who lift others up'],
    'Arts':          ['Discovering creative triumphs…',            'Art is alive and thriving'],
    'Community':     ['Finding the unsung heroes…',                'Small acts, massive impact'],
    'Custom Search': ['Painting your custom news canvas…',         'Finding the bright side of your topic'],
  };
  const m = messages[cat] || messages['Custom Search'];
  document.getElementById('loaderText').textContent = m[0];
  document.getElementById('loaderSub').textContent  = m[1];
}

// ── RENDER ────────────────────────────────────────────────────────
function renderFeed(data) {
  const topArticle = document.getElementById('topArticle');
  const cardsGrid  = document.getElementById('cardsGrid');

  const top  = data.stories.find(s => s.isTop) || data.stories[0];
  const rest = data.stories.filter(s => s.id !== top.id);

  topArticle.innerHTML = `
    <div>
      <div class="article-tag">
        <span>${top.tag}</span>
        <span class="joy-pill">✦ Joy ${top.joyScore}</span>
      </div>
      <h2 class="top-headline" onclick="openModal(${top.id})">${top.headline}</h2>
      <p class="top-deck">${top.deck}</p>
      <div class="article-meta">
        <span class="joy-badge">Joy ${top.joyScore}</span>
        <span>${top.timeAgo}</span>
        <a href="${top.sourceUrl}" target="_blank" class="src-link">${top.source}</a>
        <span>iPaint</span>
      </div>
    </div>
    <div class="aside-stack">
      ${rest.map(s => `
        <div class="aside-item" onclick="openModal(${s.id})">
          <div class="aside-tag">${s.tag}</div>
          <div class="aside-headline">${s.headline}</div>
          <div class="aside-deck">${s.deck.split('.')[0]}.</div>
        </div>
      `).join('')}
    </div>
  `;

  cardsGrid.innerHTML = rest.map(s => `
    <div class="news-card" onclick="openModal(${s.id})">
      <div class="card-tag">${s.tag}</div>
      <h3 class="card-headline">${s.headline}</h3>
      <p class="card-deck">${s.deck}</p>
      <div class="card-footer">
        <span class="card-time">${s.timeAgo}</span>
        <div class="joy-bar-wrap">
          <div class="joy-bar"><div class="joy-fill" style="width:${s.joyScore}%"></div></div>
          <span class="joy-bar-num">${s.joyScore}</span>
        </div>
      </div>
    </div>
  `).join('');
}

// ── MODAL ─────────────────────────────────────────────────────────
function openModal(id) {
  const s = articles.find(a => a.id === id);
  if (!s) return;

  document.getElementById('mTag').textContent = s.tag + ' · Joy Score ' + s.joyScore;
  document.getElementById('mHeadline').textContent = s.headline;
  document.getElementById('mMeta').innerHTML = `
    <span class="joy-badge">${s.joyScore} Joy</span>
    <span>${s.timeAgo}</span>
    <a href="${s.sourceUrl}" target="_blank" class="src-link">${s.source}</a>
  `;

  const paras = (s.body || s.deck).split(/\n+/).filter(p => p.trim().length > 10);
  document.getElementById('mBody').innerHTML = paras.map(p => `<p>${p}</p>`).join('');
  document.getElementById('mSource').textContent = `Source: ${s.source} · Curated by iPaint · All stories filtered for positivity`;

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function maybeCloseModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── INIT ──────────────────────────────────────────────────────────
loadNews();
</script>
</body>
</html>
